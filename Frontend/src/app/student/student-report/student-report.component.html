<div class="container mt-4">
  <h3>Student Attendance Dashboard</h3>

  <div class="row text-white my-3">
    <div class="col-md-6">
      <div class="card bg-success" (click)="filterList('Present')" style="cursor: pointer">
        <div class="card-body text-center">
          <h4>Present Today</h4>
          <h2>{{ presentCount }}</h2>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card bg-danger" (click)="filterList('Absent')" style="cursor: pointer">
        <div class="card-body text-center">
          <h4>Absent Today</h4>
          <h2>{{ absentCount }}</h2>
        </div>
      </div>
    </div>
  </div>

  <form [formGroup]="reportForm" (ngSubmit)="filterList()" class="mb-3">
    <div class="row">
      <div class="col">
        <label>From Date</label>
        <input type="date" class="form-control" formControlName="fromDate" />
      </div>
      <div class="col">
        <label>To Date</label>
        <input type="date" class="form-control" formControlName="toDate" />
      </div>
      <div class="col">
        <label>Student Name</label>
        <input type="text" class="form-control" formControlName="studentName" />
      </div>
      <div class="col">
        <label>Roll No</label>
        <input type="text" class="form-control" formControlName="rollNo" />
      </div>
    </div>
    <button type="submit" [disabled]="reportForm.invalid">Submit</button>
  </form>

  <!-- Report List -->
  <div *ngIf="viewType" class="mt-4">
    <h5>{{ viewType }} Students</h5>
    <table class="table table-bordered mt-2">
      <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Roll No</th>
          <th>Class</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of filteredList">
          <td>{{ s.firstName }}</td>
          <td>{{ s.lastName }}</td>
          <td>{{ s.rollNo }}</td>
          <td>{{ s.class }}</td>
          <td>{{ s.attendanceDate | date }}</td>
          <td>{{ s.status }}</td>
        </tr>
      </tbody>
    </table>

    <!-- <ul class="pagination">
      <li class="page-item" [class.disabled]="pageIndex === 1">
        <a class="page-link" (click)="onPageChange(pageIndex - 1)">Previous</a>
      </li>
      <li *ngFor="let page of pages" class="page-item" [class.active]="page === pageIndex">
        <a class="page-link" (click)="onPageChange(page)">{{ page }}</a>
      </li>
      <li class="page-item" [class.disabled]="pageIndex === pages.length">
        <a class="page-link" (click)="onPageChange(pageIndex + 1)">Next</a>
      </li>
    </ul> -->
    <nav *ngIf="studentList?.length > pageSize">
  <ul class="pagination">
    <li class="page-item" [class.disabled]="pageIndex === 1">
      <button class="page-link" (click)="onPageChange(pageIndex - 1)">Previous</button>
    </li>

    <li
      class="page-item"
      *ngFor="let page of pages"
      [class.active]="pageIndex === page"
    >
      <button class="page-link" (click)="onPageChange(page)">
        {{ page }}
      </button>
    </li>

    <li class="page-item" [class.disabled]="pageIndex === pages.length">
      <button class="page-link" (click)="onPageChange(pageIndex + 1)">Next</button>
    </li>
  </ul>
  
</nav>
  </div>
</div>
