<div class="container mt-4">
  <input class="form-control mb-2" [(ngModel)]="searchKeyword" (input)="onSearch()" placeholder="Search by name or roll" />
  <button class="btn btn-success mb-3" (click)="openStudentModal()">+ Add Student</button>

  <table class="table table-bordered">
    <thead>
        <tr>
            <th>FirstName</th>
            <th>LastName</th>
            <th>Roll No</th>
            <th>Class</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of data">
        <td>{{ item.firstName }}</td>
        <td>{{ item.lastName }}</td>
        <td>{{ item.rollNo }}</td>
        <td>{{ item.class }}</td>
        <td>
          <button class="btn btn-sm btn-primary" (click)="openStudentModal(item)">Edit</button>
          <button class="btn btn-sm btn-warning" (click)="openAttendanceModal(item)">Mark Attendance</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Pagination controls -->
  <nav *ngIf="totalRecords > pageSize">
  <ul class="pagination">
    <li class="page-item" [class.disabled]="pageIndex === 1">
      <button class="page-link" (click)="onPageChange(pageIndex - 1)">Previous</button>
    </li>

    <li
      class="page-item"
      *ngFor="let page of pages"
      [class.active]="pageIndex === page"
    >
      <button class="page-link" (click)="onPageChange(page)">
        {{ page }}
      </button>
    </li>

    <li class="page-item" [class.disabled]="pageIndex === pages.length">
      <button class="page-link" (click)="onPageChange(pageIndex + 1)">Next</button>
    </li>
  </ul>
  <div class="text-muted mb-2" *ngIf="totalRecords > 0">
  {{ recordSummary }}
</div>
</nav>
</div>

<div class="modal fade show" tabindex="-1" style="display:block;" *ngIf="showStudentModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form [formGroup]="studentAddUpdateForm" (ngSubmit)="saveStudents()">
        <div class="modal-header">
          <h5 class="modal-title">Student Form</h5>
          <button type="button" class="btn-close" (click)="showStudentModal = false">x</button>
        </div>
        <div class="modal-body">
          <div formArrayName="students">
            <div *ngFor="let s of students.controls; let i = index" [formGroupName]="i" class="border rounded p-3 mb-3 bg-light">
              <div class="row">
                <div class="col"><input class="form-control" formControlName="firstName" placeholder="First Name" /></div>
                <div class="col"><input class="form-control" formControlName="lastName" placeholder="Last Name" /></div>
                <div class="col"><input class="form-control" formControlName="rollNo" placeholder="Roll No" /></div>
                <div class="col"><input class="form-control" formControlName="class" placeholder="Class" (change)="validateClass(i)" />
                <div class="text-danger" *ngIf="students.at(i).get('class')?.hasError('invalidClass') && students.at(i).get('class')?.touched">
                Class name is not allowed.</div>
                </div>
                <div class="col-12 mt-2">
                <span *ngIf="commonData?.length" [title]="'Only allowed class names'">
                    Allowed Classes: {{ getCommonClassNames() }}
                </span>
                </div>
                <div class="col-auto">
                  <button type="button" class="btn btn-danger" *ngIf="students.length > 1" (click)="removeStudent(i)">X</button>
                </div>
              </div>
            </div>
          </div>
          <button *ngIf="!isEdit" type="button" class="btn btn-secondary" (click)="addMore()">+ Add More</button>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" type="submit">{{ isEdit ? 'Edit' : 'Save' }}</button>
          <button class="btn btn-outline-secondary" type="button" (click)="showStudentModal = false">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="showStudentModal"></div>

<!-- Attendance Modal -->
<div class="modal fade show" tabindex="-1" style="display:block;" *ngIf="showAttendanceModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <form [formGroup]="attendanceForm" (ngSubmit)="markAttendance()">
        <div class="modal-header">
          <h5 class="modal-title">Mark Attendance</h5>
          <button type="button" class="btn-close" (click)="showAttendanceModal = false">x</button>
        </div>
        <div class="modal-body row">
            <div class="col-md-6">
          <label>Date</label>
          <input class="form-control mb-2" formControlName="attendanceDate" type="date" />
          </div>
          <div class="col-md-6">
          <label>Status</label>
          <div class="form-check">
            <input type="radio" formControlName="status" class="form-check-input" value="Present" /> Present
          </div>
          <div class="form-check">
            <input type="radio" formControlName="status" class="form-check-input" value="Absent" /> Absent
          </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-secondary" (click)="showAttendanceModal = false">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="showAttendanceModal"></div>
